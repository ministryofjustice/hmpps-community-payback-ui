name: Seed unpaid work data

on:
  workflow_dispatch:
    inputs:
      seed_data_file:
        description: 'The seed data file to use'
        required: true
        default: 'seed_data.yml'
        type: choice
        options:
          - seed_data.yml
          - seed_data_group.yml
      project:
        description: 'Select the test project to run'
        required: true
        default: project-allocations
        type: choice
        options:
          - project-allocations
          - course-completions

permissions:
  contents: read

jobs:
  create-session-test-data:
    runs-on: [self-hosted, Linux, X64, hmpps-github-actions-runner]

    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          # Repository is specified to run the workflow from the API repository
          repository: 'ministryofjustice/hmpps-community-payback-ui'

      - name: Setup Node.js environment
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: install dependencies
        shell: bash
        run: |
          npm run setup

      - name: install playwright
        shell: bash
        run: |
          npx playwright install

      - name: run seed data task
        env:
          ETE_EXTERNAL_API_ENABLED: 'TRUE'
          ETE_EXTERNAL_API_URL: 'https://dev.integration-api.hmpps.service.justice.gov.uk/v1/education/course-completion'
          ETE_EXTERNAL_API_CERT_B64: ${{ secrets.ETE_EXTERNAL_API_CERT_B64 }}
          ETE_EXTERNAL_API_PRIVATE_KEY_B64: ${{ secrets.ETE_EXTERNAL_API_PRIVATE_KEY_B64 }}
          ETE_EXTERNAL_API_API_KEY: ${{ secrets.ETE_EXTERNAL_API_API_KEY }}
          DELIUS_USERNAME: ${{ secrets.DELIUS_USERNAME }}
          DELIUS_PASSWORD: ${{ secrets.DELIUS_PASSWORD }}
          DELIUS_URL: ${{ vars.DELIUS_URL }}
          SEED_DATA_PATH: 'seed_data/${{ github.event.inputs.seed_data_file }}'
          TIMEOUT_INTERVAL: 3600000
        shell: bash
        run: |
          npx playwright test --project ${{ inputs.project }}
      - name: upload results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: npm_e2e_test_artifacts
          path: |
            e2e-tests/test_results/
            e2e-tests/playwright-report/
