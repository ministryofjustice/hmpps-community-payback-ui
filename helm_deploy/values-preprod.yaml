---
# Per environment values which override defaults in hmpps-community-payback-ui/values.yaml

generic-service:
  replicaCount: 2

  ingress:
    host: community-payback-preprod.hmpps.service.justice.gov.uk
    tlsSecretName: hmpps-community-payback-preprod-cert

  env:
    INGRESS_URL: "https://community-payback-preprod.hmpps.service.justice.gov.uk"
    HMPPS_AUTH_URL: "https://sign-in-preprod.hmpps.service.justice.gov.uk/auth"
    TOKEN_VERIFICATION_API_URL: "https://token-verification-api-preprod.prison.service.justice.gov.uk"
    COMMUNITY_PAYBACK_API_URL: 'https://community-payback-api-preprod.hmpps.service.justice.gov.uk'
    ENVIRONMENT_NAME: PREPROD
    AUDIT_ENABLED: "true"

generic-prometheus-alerts:
  alertSeverity: hmpps-community-payback-nonprod
